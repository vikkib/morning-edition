name: Daily Briefing

on:
  schedule:
    - cron: '30 11 * * *'  # 6:30am CDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run daily briefing
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SLACK_WEBHOOK:        ${{ secrets.SLACK_WEBHOOK }}
        run: python3 daily-briefing.py

      - name: Write Obsidian daily note
        run: python3 write-obsidian-note.py

      - name: Commit and push daily note
        run: |
          git config user.name "Morning Edition Bot"
          git config user.email "bot@3bees.digital"
          git add daily/
          git commit -m "Daily note $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
