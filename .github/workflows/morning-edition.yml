name: Morning Edition

on:
  schedule:
    - cron: '45 11 * * *'  # 6:45am CDT
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS feeds
        run: |
          curl -sL --max-time 15 'https://techcrunch.com/category/artificial-intelligence/feed/' > /tmp/techcrunch.xml || echo "failed" > /tmp/techcrunch.xml
          curl -sL --max-time 15 'https://www.sabrina.dev/feed' > /tmp/sabrina.xml || echo "failed" > /tmp/sabrina.xml
          curl -sL --max-time 15 'https://feeds.feedburner.com/venturebeat/SZYF' > /tmp/venturebeat.xml || echo "failed" > /tmp/venturebeat.xml
          curl -sL --max-time 15 'https://tldr.tech/api/rss/tech' > /tmp/tldr.xml || echo "failed" > /tmp/tldr.xml
          curl -sL --max-time 20 -A "Mozilla/5.0 (compatible; MorningEdition/1.0)" 'https://www.superhuman.ai/' > /tmp/superhuman_index.html || echo "" > /tmp/superhuman_index.html
          wc -c /tmp/techcrunch.xml /tmp/sabrina.xml /tmp/venturebeat.xml /tmp/tldr.xml /tmp/superhuman_index.html

      - name: Generate HTML briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate.py

      - name: Commit and push
        run: |
          git config user.name "Morning Edition Bot"
          git config user.email "bot@3bees.digital"
          git add index.html
          git commit -m "Morning Edition $(date '+%Y-%m-%d')" || echo "No changes"
          git push

      - name: Notify Slack
        run: |
          DATE=$(date '+%A, %B %-d, %Y')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"*Morning Edition is ready* -- $DATE\n<https://vikkib.github.io/morning-edition/|Open your briefing>\"}" \
            '${{ secrets.SLACK_WEBHOOK }}'
